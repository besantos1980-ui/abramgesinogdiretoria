name: Rotina Semanal ANS

on:
  schedule:
    - cron: '0 3 * * 1' # Roda toda segunda-feira às 03:00 UTC
  workflow_dispatch: # Permite rodar o script manualmente clicando num botão

jobs:
  extrair_e_processar:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas
      run: |
        pip install duckdb requests beautifulsoup4 pandas

    - name: Instalar dependências
      run: |
          python -m pip install --upgrade pip
          pip install duckdb requests beautifulsoup4 pandas openpyxl

    - name: Executar Pipeline (Ordem Estrita)
      run: |
        python 01_extracao_cadop.py
        python 02_extracao_beneficiarios.py
        python 03_extracao_contabil.py
        python 04_consolidacao.py
        python 05_beneficiarios_historico.py

    - name: Fazer commit dos novos dados (JSON e ZIP)
      run: |
        # 1. Compacta o arquivo CSV gigante para passar no limite do GitHub
        zip auditoria.zip auditoria.csv
        
        # 2. Apaga o CSV original solto para o Git não tentar enviá-lo
        rm auditoria.csv
        
        # 3. Configura o robô do Git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 4. Adiciona o JSON do dashboard e o ZIP da auditoria
        git add dashboard.json auditoria.zip
        
        # 5. Só faz o commit se houver alguma mudança
        git diff --quiet && git diff --staged --quiet || (git commit -m "Rotina automatizada: Atualização dos dados da ANS" && git push)
