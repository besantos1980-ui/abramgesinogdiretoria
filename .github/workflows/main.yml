name: Atualizar Dados ANS

on:
  schedule:
    - cron: '0 0 * * 1' # Roda toda segunda-feira à meia-noite
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Executar script de extração
        run: python seu_script.py  # <--- CERTIFIQUE-SE QUE O NOME DO ARQUIVO .PY ESTÁ CORRETO AQUI

      - name: Upload dos resultados (JSON e CSV de Auditoria)
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-ans-odonto
          path: |
            *.json
            *.csv
          if-no-files-found: warn
